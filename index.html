<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Primary Meta Tags -->
    <title>GemsLink - Premium Jewelry Marketplace</title>
    <meta name="title" content="GemsLink - Premium Jewelry Marketplace" />
    <meta name="description" content="Discover extraordinary gemstones and handcrafted jewelry from verified sellers worldwide. Connect directly with trusted jewelers." />
    <meta name="author" content="GemsLink" />
    <meta name="keywords" content="jewelry marketplace, gemstones, engagement rings, necklaces, earrings, bracelets, diamonds, sapphires, emeralds, luxury jewelry" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta name="theme-color" content="#2E2E2E" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GemsLink" />
    
    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Microsoft PWA -->
    <meta name="msapplication-TileColor" content="#9A7B4F" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/CGLogo.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/AppIcon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="/AppIcon.png" />
